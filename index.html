<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetruCS | Portafolio Digital</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER / NAVEGACIÓN -->
    <header class="navbar">
        <div class="logo-container" style="display: flex; align-items: center; gap: 0;">
            <!-- SVG de la P Geométrica Idéntica, Proporcional y con Mástil Largo -->
            <svg class="logo-svg" viewBox="10 10 75 110" xmlns="http://www.w3.org/2000/svg" style="width: 40px; height: 55px; display: block;">
                <defs>
                    <linearGradient id="gradient-morado-amarillo" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="var(--acento-morado)" />
                        <stop offset="100%" stop-color="var(--acento-amarillo)" />
                    </linearGradient>
                </defs>
                
                <g stroke="var(--fondo-principal)" stroke-width="1" stroke-linejoin="round">
                    <!-- MÁSTIL IZQUIERDO ALARGADO (Una sola pieza limpia hacia abajo) -->
                    <path d="M 15 35 L 32 45 L 32 115 L 15 105 Z" fill="var(--acento-morado)" />
                    
                    <!-- Pliegue Superior Izquierdo -->
                    <path d="M 15 35 L 48 16 L 48 45 L 32 45 Z" fill="url(#gradient-morado-amarillo)" opacity="0.95" />
                    
                    <!-- Pliegue Superior Derecho -->
                    <path d="M 48 16 L 80 35 L 62 45 L 48 45 Z" fill="var(--acento-amarillo)" />
                    
                    <!-- Pliegue Medio Derecho -->
                    <path d="M 80 35 L 80 70 L 62 60 L 62 45 Z" fill="var(--acento-amarillo)" opacity="0.85" />
                    
                    <!-- Pliegue Inferior Derecho -->
                    <path d="M 80 70 L 48 89 L 48 60 L 62 60 Z" fill="url(#gradient-morado-amarillo)" />
                    
                    <!-- Pliegue Conector Central Interno -->
                    <path d="M 48 60 L 32 53 L 32 45 L 48 45 Z" fill="url(#gradient-morado-amarillo)" opacity="0.7" />
                </g>
            </svg>
            <!-- Texto pegado inmediatamente sin separaciones muertas -->
            <span class="logo-text" style="margin-left: 2px; line-height: 1; display: inline-block;">ETRUCS</span>
        </div>

        <nav class="nav-links">
            <a href="#sobre-mi" class="nav-item">Biografía</a>
            <a href="#mis-videos" class="nav-item">Mis Videos</a>
            <a href="#contacto" class="nav-item">Contacto</a>
            <button id="theme-toggle" class="toggle-btn" aria-label="Cambiar tema">🌙</button>
        </nav>
    </header>

    <!-- FONDO ANIMADO LÍQUIDO -->
    <div class="background-glow"></div>

    <!-- SECCIÓN HERO (BIENVENIDA) -->
    <section class="hero">
        <div class="hero-content">
            <h1>Hola, soy <span class="text-gradient">PetruCS</span></h1>
            <p>Creador de contenido, vlogger y apasionado por el diseño digital.</p>
            <a href="#mis-videos" class="btn-primary">Ver mi trabajo</a>
        </div>
    </section>

    <!-- SCRIPT INTERACTIVO PARA EL CAMBIO DE MODO -->
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;

        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                htmlElement.setAttribute('data-theme', 'light');
                toggleBtn.textContent = '☀️';
            } else {
                htmlElement.setAttribute('data-theme', 'dark');
                toggleBtn.textContent = '🌙';
            }
        });
    </script>
</body>
</html>
