<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetruCS | Portafolio Digital</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER / NAVEGACIÓN -->
    <header class="navbar">
        <div class="logo-container">
            <!-- SVG Ajustado en su caja de visualización para eliminar el espacio muerto derecho -->
            <svg class="logo-svg" viewBox="10 10 80 115" xmlns="http://www.w3.org/2000/svg" style="width: 36px; height: 48px;">
                <defs>
                    <linearGradient id="gradient-morado-amarillo" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="var(--acento-morado)" />
                        <stop offset="100%" stop-color="var(--acento-amarillo)" />
                    </linearGradient>
                </defs>
                
                <!-- Grupo con los pliegues geométricos del hexágono estilo obturador -->
                <g stroke="var(--fondo-principal)" stroke-width="1.5" stroke-linejoin="round">
                    <!-- Segmento Izquierdo Superior -->
                    <path d="M 15 35 L 50 15 L 50 45 L 28 58 Z" fill="url(#gradient-morado-amarillo)" opacity="0.95" />
                    <!-- Segmento Superior Derecho -->
                    <path d="M 50 15 L 85 35 L 63 48 L 50 45 Z" fill="var(--acento-amarillo)" />
                    <!-- Segmento Medio Derecho -->
                    <path d="M 85 35 L 85 75 L 63 62 L 63 48 Z" fill="var(--acento-amarillo)" opacity="0.85" />
                    <!-- Segmento Inferior Derecho -->
                    <path d="M 85 75 L 50 95 L 50 65 L 63 62 Z" fill="url(#gradient-morado-amarillo)" />
                    <!-- Segmento Central / Pliegue interno -->
                    <path d="M 50 65 L 28 58 L 50 45 L 63 48 L 63 62 Z" fill="none" />
                    
                    <!-- MÁSTIL IZQUIERDO ALARGADO -->
                    <path d="M 15 35 L 28 42 L 28 120 L 15 112 Z" fill="var(--acento-morado)" />
                </g>
            </svg>
            <!-- Margen negativo para jalar el texto directamente hacia el logo geométrico -->
            <span class="logo-text" style="margin-left: -4px;">ETRUCS</span>
        </div>

        <nav class="nav-links">
            <a href="#sobre-mi" class="nav-item">Biografía</a>
            <a href="#mis-videos" class="nav-item">Mis Videos</a>
            <a href="#contacto" class="nav-item">Contacto</a>
            <!-- Conmutador de Modo Claro/Oscuro -->
            <button id="theme-toggle" class="toggle-btn" aria-label="Cambiar tema">🌙</button>
        </nav>
    </header>

    <!-- FONDO ANIMADO LÍQUIDO -->
    <div class="background-glow"></div>

    <!-- SECCIÓN HERO (BIENVENIDA) -->
    <section class="hero">
        <div class="hero-content">
            <h1>Hola, soy <span class="text-gradient">PetruCS</span></h1>
            <p>Creador de contenido, vlogger y apasionado por el diseño digital.</p>
            <a href="#mis-videos" class="btn-primary">Ver mi trabajo</a>
        </div>
    </section>

    <!-- SCRIPT INTERACTIVO PARA EL CAMBIO DE MODO -->
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;

        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                htmlElement.setAttribute('data-theme', 'light');
                toggleBtn.textContent = '☀️';
            } else {
                htmlElement.setAttribute('data-theme', 'dark');
                toggleBtn.textContent = '🌙';
            }
        });
    </script>
</body>
</html>
