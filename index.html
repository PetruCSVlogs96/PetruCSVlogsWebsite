<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetruCS | Portafolio Digital</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER / NAVEGACIÓN -->
<!-- HEADER / NAVEGACIÓN CORREGIDO (Palito de la P alargado) -->
    <header class="navbar">
        <div class="logo-container">
            <!-- SVG Ajustado para alargar la base de la P geométrica -->
            <svg class="logo-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" style="width: 38px; height: 45px;">
                <defs>
                    <linearGradient id="gradient-logo" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--acento-morado)" />
                        <stop offset="100%" stop-color="var(--acento-amarillo)" />
                    </linearGradient>
                </defs>
                <!-- Cuerpo poligonal superior de la P -->
                <path d="M 45 15 L 75 32 L 75 68 L 45 85 L 15 68 L 15 32 Z" fill="none" stroke="url(#gradient-logo)" stroke-width="12" stroke-linejoin="round"/>
                <path d="M 45 15 L 75 32 L 75 68 L 45 50 Z" fill="url(#gradient-logo)" opacity="0.85"/>
                <!-- Extensión alargada del mástil izquierdo para marcar la P claramente -->
                <path d="M 15 32 L 15 110" stroke="var(--acento-morado)" stroke-width="12" stroke-linecap="round"/>
                <path d="M 15 50 L 45 50" stroke="var(--acento-morado)" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
            </svg>
            <span class="logo-text" style="margin-left: 6px;">ETRUCS</span>
        </div>

        <nav class="nav-links">
            <a href="#sobre-mi" class="nav-item">Biografía</a>
            <a href="#mis-videos" class="nav-item">Mis Videos</a>
            <a href="#contacto" class="nav-item">Contacto</a>
            <button id="theme-toggle" class="toggle-btn" aria-label="Cambiar tema">🌙</button>
        </nav>
    </header>
                
                <!-- Grupo con el degradado aplicado a todo el conjunto geométrico -->
                <g fill="url(#aperture-gradient)" stroke="none">
                    <!-- Segmento 1: Mástil vertical izquierdo largo -->
                    <polygon points="20,26 42,13 42,87 20,74" />
                    
                    <!-- Segmento 2: Diagonal superior izquierda -->
                    <polygon points="42,13 68,13 52,40 33,24" />
                    
                    <!-- Segmento 3: Diagonal superior derecha -->
                    <polygon points="68,13 86,39 64,46 52,40" />
                    
                    <!-- Segmento 4: Lateral derecho vertical -->
                    <polygon points="86,39 86,65 64,53 64,46" />
                    
                    <!-- Segmento 5: Diagonal inferior derecha (cierre del bucle) -->
                    <polygon points="86,65 54,83 48,59 64,53" />
                    
                    <!-- Segmento 6: Cruce central que define el hueco de la P -->
                    <polygon points="42,50 64,53 48,59 42,59" />
                </g>
            </svg>
            <span class="logo-text">ETRUCS</span>
        </div>

        <nav class="nav-links">
            <a href="#sobre-mi" class="nav-item">Biografía</a>
            <a href="#mis-videos" class="nav-item">Mis Videos</a>
            <a href="#contacto" class="nav-item">Contacto</a>
            <button id="theme-toggle" class="toggle-btn" aria-label="Cambiar tema">🌙</button>
        </nav>
    </header>

    <!-- FONDO ANIMADO LÍQUIDO -->
    <div class="background-glow"></div>

    <!-- SECCIÓN HERO (BIENVENIDA) -->
    <section class="hero">
        <div class="hero-content">
            <h1>Hola, soy <span class="text-gradient">PetruCS</span></h1>
            <p>Creador de contenido, vlogger y apasionado por el diseño digital.</p>
            <a href="#mis-videos" class="btn-primary">Ver mi trabajo</a>
        </div>
    </section>

    <!-- SCRIPT PARA EL CAMBIO DE MODO -->
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;

        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                htmlElement.setAttribute('data-theme', 'light');
                toggleBtn.textContent = '☀️';
            } else {
                htmlElement.setAttribute('data-theme', 'dark');
                toggleBtn.textContent = '🌙';
            }
        });
    </script>
</body>
</html>
