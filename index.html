<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetruCS | Portafolio Digital</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER / NAVEGACIÓN -->
    <header class="navbar">
        <div class="logo-container" style="display: flex; align-items: center; gap: 0; padding: 0;">
            <!-- SVG de la P con Geometría de Obturador de Cámara Exacta y Mástil Largo -->
            <svg class="logo-svg" viewBox="10 10 75 115" xmlns="http://www.w3.org/2000/svg" style="width: 42px; height: 56px; display: block; margin: 0;">
                <defs>
                    <!-- Gradiente continuo para los pliegues metálicos del logo -->
                    <linearGradient id="pliegue-gradiente" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="var(--acento-morado)" />
                        <stop offset="60%" stop-color="#a855f7" />
                        <stop offset="100%" stop-color="var(--acento-amarillo)" />
                    </linearGradient>
                </defs>
                
                <!-- Contenedor general con bordes internos oscuros para separar los pliegues tridimensionales -->
                <g stroke="var(--fondo-principal)" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round">
                    
                    <!-- 1. MÁSTIL IZQUIERDO LARGO (Base de la P tal cual la imagen) -->
                    <path d="M 16 34 L 34 44 L 34 118 L 16 108 Z" fill="var(--acento-morado)" />
                    
                    <!-- 2. PLIEGUE SUPERIOR IZQUIERDO -->
                    <path d="M 16 34 L 50 14 L 50 44 L 34 44 Z" fill="url(#pliegue-gradiente)" opacity="0.95" />
                    
                    <!-- 3. PLIEGUE SUPERIOR DERECHO -->
                    <path d="M 50 14 L 84 34 L 66 44 L 50 44 Z" fill="var(--acento-amarillo)" />
                    
                    <!-- 4. PLIEGUE LATERAL DERECHO -->
                    <path d="M 84 34 L 84 74 L 66 64 L 66 44 Z" fill="var(--acento-amarillo)" opacity="0.9" />
                    
                    <!-- 5. PLIEGUE INFERIOR DERECHO -->
                    <path d="M 84 74 L 50 94 L 50 64 L 66 64 Z" fill="url(#pliegue-gradiente)" />
                    
                    <!-- 6. CONECTOR CENTRAL (Cierra el Espacio del Obturador) -->
                    <path d="M 50 64 L 34 54 L 34 44 L 50 44 Z" fill="url(#pliegue-gradiente)" opacity="0.8" />
                    
                </g>
            </svg>
            <!-- Texto ETRUCS pegado al ras del diseño del isotipo -->
            <span class="logo-text" style="margin-left: 0px; padding-left: 0px; line-height: 1; display: inline-block;">ETRUCS</span>
        </div>

        <nav class="nav-links">
            <a href="#sobre-mi" class="nav-item">Biografía</a>
            <a href="#mis-videos" class="nav-item">Mis Videos</a>
            <a href="#contacto" class="nav-item">Contacto</a>
            <!-- Interruptor de Tema Oscuro/Claro -->
            <button id="theme-toggle" class="toggle-btn" aria-label="Cambiar tema">🌙</button>
        </nav>
    </header>

    <!-- FONDO ANIMADO LÍQUIDO -->
    <div class="background-glow"></div>

    <!-- SECCIÓN HERO (BIENVENIDA) -->
    <section class="hero">
        <div class="hero-content">
            <h1>Hola, soy <span class="text-gradient">PetruCS</span></h1>
            <p>Creador de contenido, vlogger y apasionado por el diseño digital.</p>
            <a href="#mis-videos" class="btn-primary">Ver mi trabajo</a>
        </div>
    </section>

    <!-- SCRIPT DE INTERACCIÓN DE TEMA -->
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;

        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                htmlElement.setAttribute('data-theme', 'light');
                toggleBtn.textContent = '☀️';
            } else {
                htmlElement.setAttribute('data-theme', 'dark');
                toggleBtn.textContent = '🌙';
            }
        });
    </script>
</body>
</html>
